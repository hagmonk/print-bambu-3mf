name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run tests
        run: go test ./...

      # Mint a short-lived token scoped to ONLY the homebrew-tap repo. The
      # default GITHUB_TOKEN can't push cross-repo; this is least-privilege and
      # not tied to any user. Requires a GitHub App (Contents: read/write,
      # installed only on homebrew-tap) with its id/key in repo secrets.
      - uses: actions/create-github-app-token@v1
        id: tap-token
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: hagmonk
          repositories: homebrew-tap

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Default token publishes the release on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scoped App installation token for the cross-repo Cask push.
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
